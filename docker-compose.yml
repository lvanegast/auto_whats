services:
  # ============================================================================
  # 1. GATEWAY DE WHATSAPP (OPENWA)
  # ============================================================================
  openwa-gateway:
    image: ghcr.io/rmyndharis/openwa:latest
    container_name: openwa-gateway
    restart: unless-stopped
    ports:
      - "2785:2785" # Puerto de la API HTTP de OpenWA
    environment:
      - API_MASTER_KEY=dev-admin-key
    volumes:
      # Persiste las sesiones, el código QR y la API key generada en tu máquina local
      - ./openwa_data:/app/data
    networks:
      - whatsapp_net

  # ============================================================================
  # 2. NUESTRO BACKEND PYTHON (FASTAPI + LANGCHAIN)
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-whats-app
    restart: unless-stopped
    ports:
      - "8000:8000" # Exponer puerto de FastAPI al host
    environment:
      - PORT=8000
      - OPENWA_API_URL=http://openwa-gateway:2785 # Conexión interna Docker
      - OPENWA_API_KEY=dev-admin-key
      - OPENWA_SESSION_ID=default
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres-secret-pwd@postgres-db:5432/auto_whats_db
      - GOOGLE_API_KEY=your-api-key-here
    depends_on:
      - openwa-gateway
      - postgres-db
    networks:
      - whatsapp_net

  # ============================================================================
  # 3. BASE DE DATOS POSTGRESQL (PERSISTENCIA PROFESIONAL)
  # ============================================================================
  postgres-db:
    image: postgres:16-alpine
    container_name: whatsapp-postgres-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres-secret-pwd
      - POSTGRES_DB=auto_whats_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - whatsapp_net

# ------------------------------------------------------------------------------
# RED INTERNA COMPARTIDA
# ------------------------------------------------------------------------------
networks:
  whatsapp_net:
    driver: bridge
